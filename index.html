<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="logo-strip" aria-label="Loghi clienti ed esperienze professionali">
    <div class="logo-strip__fade logo-strip__fade--left" aria-hidden="true"></div>
    <div class="logo-strip__fade logo-strip__fade--right" aria-hidden="true"></div>

    <div class="logo-strip__track">
      <div class="logo-strip__group">
        <img src="assets/wave-marketing.png" alt="Wave Marketing" />
        <img src="assets/leroy-merlin.png" alt="Leroy Merlin" />
        <img src="assets/auto1-group.png" alt="Auto1 Group" />
        <img src="assets/witailer.png" alt="Witailer" />
        <img src="assets/chef-max-mariola.png" alt="Chef Max Mariola" />
      </div>

      <div class="logo-strip__group" aria-hidden="true">
        <img src="assets/wave-marketing.png" alt="" />
        <img src="assets/leroy-merlin.png" alt="" />
        <img src="assets/auto1-group.png" alt="" />
        <img src="assets/witailer.png" alt="" />
        <img src="assets/chef-max-mariola.png" alt="" />
      </div>
    </div>
  </section>
</body>
</html>
