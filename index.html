<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="logo-strip" aria-label="Loghi clienti ed esperienze professionali">
    <div class="logo-strip__track">
      <div class="logo-strip__group">
        <img class="logo logo-wave" src="assets/wave-marketing.png" alt="Wave Marketing" />
        <img class="logo logo-leroy" src="assets/leroy-merlin.png" alt="Leroy Merlin" />
        <img class="logo logo-auto1" src="assets/auto1-group.png" alt="Auto1 Group" />
        <img class="logo logo-witailer" src="assets/witailer.png" alt="Witailer" />
        <img class="logo logo-chef" src="assets/chef-max-mariola.png" alt="Chef Max Mariola" />
      </div>

      <div class="logo-strip__group" aria-hidden="true">
        <img class="logo logo-wave" src="assets/wave-marketing.png" alt="" />
        <img class="logo logo-leroy" src="assets/leroy-merlin.png" alt="" />
        <img class="logo logo-auto1" src="assets/auto1-group.png" alt="" />
        <img class="logo logo-witailer" src="assets/witailer.png" alt="" />
        <img class="logo logo-chef" src="assets/chef-max-mariola.png" alt="" />
      </div>
    </div>
  </section>

  <script>
    // Legge ?h=220 dall'URL e imposta l'altezza del widget
    // Esempio: index.html?h=220
    (function () {
      var params = new URLSearchParams(window.location.search);
      var h = parseInt(params.get('h'), 10);
      if (h && h > 0) {
        document.documentElement.style.height = h + 'px';
        document.body.style.height = h + 'px';
        document.querySelector('.logo-strip').style.height = h + 'px';
      }
    })();
  </script>
</body>
</html>
